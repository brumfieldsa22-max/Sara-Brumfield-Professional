<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - GitHub Pages Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            color: #333;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <p>This is a simple page to test GitHub Pages deployment.</p>
    <button id="myButton">Click me!</button>
    <p id="message"></p>

    <script>
        document.getElementById('myButton').addEventListener('click', function() {
            const messageElement = document.getElementById('message');
            if (messageElement.textContent === 'Button clicked!') {
                messageElement.textContent = 'Hello from JavaScript!';
            } else {
                messageElement.textContent = 'Button clicked!';
            }
        });
    </script>
</body>
</html>
